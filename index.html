<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shalom Pro Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #0b0e14; color: #e2e8f0; }
    .glass { background: rgba(23, 27, 34, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .step-active { color: #4ade80; }
    .step-active .dot { background-color: #4ade80; box-shadow: 0 0 10px #4ade80; }
    .step-inactive { color: #475569; }
    .step-inactive .dot { background-color: #334155; }
  </style>
</head>
<body class="p-4 md:p-8">
  <div class="max-w-7xl mx-auto space-y-8">
    
    <!-- HEADER -->
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
      <div class="flex items-center gap-3">
        <div class="bg-blue-600 p-2 rounded-lg shadow-lg shadow-blue-500/20">
          <span class="material-symbols-outlined text-white text-3xl">package_2</span>
        </div>
        <div>
          <h1 class="text-2xl font-bold text-white flex items-center gap-2">
            Shalom Pro <span class="text-xs font-normal text-blue-400 border border-blue-400/30 px-1.5 rounded">v2.0</span>
          </h1>
          <p class="text-gray-400 text-sm flex items-center gap-1">
            <span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span>
            Sistema de Seguimiento Avanzado
          </p>
        </div>
      </div>
      <div class="flex gap-3">
        <button onclick="syncData()" class="flex items-center gap-2 px-4 py-2 glass rounded-xl hover:bg-white/5 transition-all text-sm font-medium">
          <span class="material-symbols-outlined text-lg">sync</span> Sincronizar
        </button>
        <button onclick="openNewOrder()" class="flex items-center gap-2 px-5 py-2.5 bg-blue-600 text-white rounded-xl hover:bg-blue-500 transition-all shadow-lg shadow-blue-600/20 text-sm font-semibold">
          <span class="material-symbols-outlined text-lg">add</span> Nuevo Pedido
        </button>
      </div>
    </div>

    <!-- STATS (Clickable for filtering) -->
    <div id="stats" class="grid grid-cols-2 md:grid-cols-5 gap-4">
      <!-- Se llena dinamicamente -->
    </div>

    <!-- MAIN TABLE -->
    <div class="glass rounded-3xl overflow-hidden shadow-2xl">
      <div class="p-6 border-b border-white/5 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <div id="filter-tabs" class="flex gap-2 p-1 bg-black/20 rounded-xl">
          <button onclick="filterTable('TODOS')" class="px-4 py-1.5 rounded-lg text-sm font-medium transition-all" id="btn-TODOS">Todos</button>
          <button onclick="filterTable('PENDIENTE')" class="px-4 py-1.5 rounded-lg text-sm text-gray-400 hover:text-white transition-all" id="btn-PENDIENTE">Pendientes</button>
          <button onclick="filterTable('EN_TRANSITO')" class="px-4 py-1.5 rounded-lg text-sm text-gray-400 hover:text-white transition-all" id="btn-EN_TRANSITO">En tránsito</button>
          <button onclick="filterTable('EN_DESTINO')" class="px-4 py-1.5 rounded-lg text-sm text-gray-400 hover:text-white transition-all" id="btn-EN_DESTINO">En destino</button>
          <button onclick="filterTable('ENTREGADO')" class="px-4 py-1.5 rounded-lg text-sm text-gray-400 hover:text-white transition-all" id="btn-ENTREGADO">Entregados</button>
        </div>
        <div class="relative w-full md:w-64">
          <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-lg">search</span>
          <input type="text" onkeyup="searchByClient(this.value)" placeholder="Buscar cliente..." class="w-full bg-black/20 border-none rounded-xl pl-10 pr-4 py-2 text-sm focus:ring-2 focus:ring-blue-600 transition-all outline-none">
        </div>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="text-[11px] font-bold text-gray-500 uppercase tracking-wider bg-white/[0.01]">
              <th class="px-6 py-4">Estado</th>
              <th class="px-6 py-4">N° Orden</th>
              <th class="px-6 py-4">Cliente</th>
              <th class="px-6 py-4">Contenido</th>
              <th class="px-6 py-4">Destino</th>
              <th class="px-6 py-4">Yape</th>
              <th class="px-6 py-4">Fecha</th>
              <th class="px-6 py-4 text-right">Acciones</th>
            </tr>
          </thead>
          <tbody id="tableBody" class="divide-y divide-white/5">
          </tbody>
        </table>
      </div>

      <!-- PAGINACIÓN -->
      <div id="pagination" class="p-4 border-t border-white/5 flex justify-between items-center text-sm text-gray-500">
      </div>
    </div>
  </div>

  <!-- MODAL DETALLE -->
  <div id="modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm hidden">
    <div class="glass w-full max-w-lg rounded-3xl shadow-2xl p-8 space-y-8 animate-in fade-in zoom-in duration-300">
      <div id="modalContent"></div>
      <button onclick="closeModal()" class="w-full py-4 bg-white/5 hover:bg-white/10 rounded-2xl font-bold transition-all border border-white/5">Cerrar</button>
    </div>
  </div>

  <!-- MODAL NUEVO PEDIDO -->
  <div id="newOrderModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm hidden">
    <div class="glass w-full max-w-lg rounded-3xl shadow-2xl p-8 space-y-6 max-h-[90vh] overflow-y-auto">
      <div class="flex justify-between items-center">
        <h2 class="text-xl font-bold text-white flex items-center gap-2">
          <span class="material-symbols-outlined text-blue-400">local_shipping</span> Nuevo Envío
        </h2>
        <button onclick="closeNewOrder()" class="p-2 hover:bg-white/10 rounded-lg transition-all">
          <span class="material-symbols-outlined text-gray-400">close</span>
        </button>
      </div>
      <form id="newOrderForm" onsubmit="submitNewOrder(event)" class="space-y-5">
        <div class="space-y-3">
          <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Destinatario</p>
          <input type="text" id="no_nombre" required oninput="validateForm()" placeholder="Nombre completo del cliente" class="w-full bg-[#161b22] text-white border border-white/10 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-600 outline-none">
          <div class="grid grid-cols-2 gap-3">
            <input type="text" id="no_dni" required oninput="validateForm()" placeholder="DNI" class="bg-[#161b22] text-white border border-white/10 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-600 outline-none">
            <input type="text" id="no_telefono" required oninput="validateForm()" placeholder="Teléfono" class="w-full bg-[#161b22] text-white border border-white/10 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-600 outline-none">
          </div>
          <input type="text" id="no_destino" list="agenciasDatalist" autocomplete="off" required oninput="onDestinoInput()" placeholder="Agencia destino (escribe ciudad o agencia)" class="w-full bg-[#161b22] text-white border border-white/10 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-600 outline-none">
          <datalist id="agenciasDatalist"></datalist>
          <input type="hidden" id="no_agencia_id">
          <p id="destinoHint" class="text-[10px] text-gray-500">Elige la agencia exacta de la lista de Shalom.</p>
          <select id="no_origen" class="w-full bg-[#161b22] text-white border border-white/10 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-600 outline-none">
            <option value="CANTO GRANDE">📍 Origen: Canto Grande</option>
            <option value="AV. PRINCIPAL">📍 Origen: Av. Principal</option>
          </select>
        </div>
        <div class="space-y-3">
          <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Producto y cobro</p>
          <select id="no_producto" required onchange="onProductChange(); validateForm()" class="w-full bg-[#161b22] text-white border border-white/10 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-600 outline-none">
            <option value="">Seleccionar producto...</option>
          </select>
          <div class="grid grid-cols-3 gap-3">
            <div>
              <label class="text-[10px] text-gray-500 block mb-1">Precio</label>
              <input type="number" id="no_precio" step="0.01" readonly class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm text-white font-medium outline-none cursor-not-allowed">
            </div>
            <div>
              <label class="text-[10px] text-gray-500 block mb-1">Anticipo</label>
              <input type="number" id="no_anticipo" step="0.01" value="10" oninput="calcSaldo(); validateForm()" class="w-full bg-[#161b22] text-white border border-white/10 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-600 outline-none">
            </div>
            <div>
              <label class="text-[10px] text-green-400 block mb-1 font-bold">Restante</label>
              <input type="number" id="no_saldo" step="0.01" readonly class="w-full bg-green-500/10 border border-green-500/30 rounded-xl px-4 py-3 text-sm text-green-400 font-bold outline-none">
            </div>
          </div>
        </div>
        <button type="submit" id="btnSubmitOrder" disabled class="w-full py-4 bg-blue-600 hover:bg-blue-500 disabled:opacity-50 disabled:cursor-not-allowed rounded-2xl font-bold transition-all text-white flex items-center justify-center gap-2">
          <span class="material-symbols-outlined">local_shipping</span> Registrar y Enviar por Shalom
        </button>
      </form>
    </div>
  </div>

  <style>
    /* Forzar que el autocompletado no cambie el color de fondo */
    input:-webkit-autofill,
    input:-webkit-autofill:hover, 
    input:-webkit-autofill:focus {
      -webkit-text-fill-color: white;
      -webkit-box-shadow: 0 0 0px 1000px #161b22 inset;
      transition: background-color 5000s ease-in-out 0s;
    }
  </style>

  <script>
    // Si abres el dashboard en localhost -> usa el backend local; si no (Vercel) -> usa el de la nube
    const API_URL = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
      ? 'http://localhost:3000/api'
      : 'https://shalom-bot-771378637930.us-central1.run.app/api';
    let allPedidos = [];
    let currentFilter = 'TODOS';
    let currentPage = 1;
    let searchQuery = '';
    const itemsPerPage = 20;

    async function loadData() {
      try {
        const res = await fetch(`${API_URL}/pedidos`);
        const data = await res.json();
        allPedidos = data.pedidos || data;
        renderStats();
        renderTable();
      } catch (err) { console.error(err); }
    }

    function renderStats() {
      const statsDef = [
        { key: 'TODOS', label: 'Total', count: allPedidos.length, color: 'text-white' },
        { key: 'PENDIENTE', label: 'Pendientes', count: allPedidos.filter(p => p.estado === 'PENDIENTE').length, color: 'text-gray-400' },
        { key: 'EN_TRANSITO', label: 'En Transito', count: allPedidos.filter(p => p.estado === 'EN_TRANSITO').length, color: 'text-purple-400' },
        { key: 'EN_DESTINO', label: 'En Destino', count: allPedidos.filter(p => p.estado === 'EN_DESTINO').length, color: 'text-orange-400' },
        { key: 'ENTREGADO', label: 'Entregados', count: allPedidos.filter(p => p.estado === 'ENTREGADO').length, color: 'text-green-400' },
      ];

      const container = document.getElementById('stats');
      container.innerHTML = statsDef.map(s => `
        <div onclick="filterTable('${s.key}')" class="glass p-4 rounded-2xl cursor-pointer hover:bg-white/5 transition-all">
          <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1">${s.label}</p>
          <p class="text-3xl font-bold ${s.color}">${s.count}</p>
        </div>
      `).join('');
    }

    function getStatusColor(status) {
      const colors = {
        'PENDIENTE': 'bg-gray-500/20 text-gray-400',
        'ENVIADO': 'bg-blue-500/20 text-blue-400',
        'EN_TRANSITO': 'bg-purple-500/20 text-purple-400',
        'EN_DESTINO': 'bg-orange-500/20 text-orange-400 border border-orange-500/50',
        'ENTREGADO': 'bg-green-500/20 text-green-400',
        'ERROR': 'bg-red-500/20 text-red-400'
      };
      return colors[status] || colors.PENDIENTE;
    }

    function renderTable() {
      let filtered = currentFilter === 'TODOS' ? allPedidos : allPedidos.filter(p => p.estado === (currentFilter === 'EN_TRANSITO' ? 'EN_TRANSITO' : currentFilter));
      
      // Si hay busqueda
      if (searchQuery) {
        filtered = filtered.filter(p => p.cliente_nombre.toLowerCase().includes(searchQuery.toLowerCase()));
      }

      const total = filtered.length;
      const start = (currentPage - 1) * itemsPerPage;
      const paginated = filtered.slice(start, start + itemsPerPage);

      // Update tab colors (must run before early return for empty results)
      ['TODOS', 'PENDIENTE', 'EN_TRANSITO', 'EN_DESTINO', 'ENTREGADO'].forEach(f => {
        const btn = document.getElementById(`btn-${f}`);
        if(!btn) return;
        if(f === currentFilter) {
          btn.classList.add('bg-blue-600', 'text-white');
          btn.classList.remove('text-gray-400');
        } else {
          btn.classList.remove('bg-blue-600', 'text-white');
          btn.classList.add('text-gray-400');
        }
      });

      const tableBody = document.getElementById('tableBody');
      if (paginated.length === 0) {
        tableBody.innerHTML = `<tr><td colspan="8" class="px-6 py-20 text-center text-gray-500 text-sm">No se encontraron pedidos con estos filtros</td></tr>`;
        renderPagination(0);
        return;
      }

      tableBody.innerHTML = paginated.map(p => `
        <tr class="group hover:bg-white/[0.02] transition-all">
          <td class="px-6 py-4">
            <span class="px-2.5 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider ${getStatusColor(p.estado)}">
              ${p.estado.replace(/_/g, ' ')}
            </span>
          </td>
          <td class="px-6 py-4">
            <p class="text-sm font-semibold text-blue-400">#${p.n_orden || String(p.id).substring(0,8)}</p>
            <p class="text-[10px] text-gray-600">${p.cod_seguimiento || '-'}</p>
          </td>
          <td class="px-6 py-4">
            <p class="text-sm font-medium text-white">${p.cliente_nombre}</p>
            <p class="text-[10px] text-gray-500">DNI: ${p.cliente_dni || '-'}</p>
          </td>
          <td class="px-6 py-4">
            <p class="text-sm text-gray-300 font-medium">
                ${p.notas ? p.notas.replace(/Sincronizado: |Shalom Contenido: |Shalom: /g, '') : '1 Paquete'}
            </p>
          </td>
          <td class="px-6 py-4">
            <p class="text-sm text-gray-400">${p.agencia_destino || '-'}</p>
          </td>
          <td class="px-6 py-4">
            <p class="text-sm font-bold text-green-400">S/${p.saldo_cobrar}</p>
          </td>
          <td class="px-6 py-4">
            <p class="text-[11px] text-gray-500">${new Date(p.created_at).toLocaleDateString()} ${new Date(p.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</p>
          </td>
          <td class="px-6 py-4 text-right flex gap-1 justify-end">
            <button onclick="verPedido('${p.id}')" class="p-2 hover:bg-white/10 rounded-lg transition-all text-gray-500 hover:text-white" title="Ver detalle">
              <span class="material-symbols-outlined text-lg">visibility</span>
            </button>
            <button onclick="deletePedido('${p.id}','${p.cliente_nombre}')" class="p-2 hover:bg-red-500/20 rounded-lg transition-all text-gray-600 hover:text-red-400" title="Eliminar">
              <span class="material-symbols-outlined text-lg">delete</span>
            </button>
          </td>
        </tr>
      `).join('');

      renderPagination(total);
    }

    function renderPagination(total) {
      const totalPages = Math.ceil(total / itemsPerPage) || 1;
      const start = total === 0 ? 0 : (currentPage - 1) * itemsPerPage + 1;
      const end = Math.min(currentPage * itemsPerPage, total);
      
      const container = document.getElementById('pagination');
      container.innerHTML = `
        <p>Mostrando ${start} a ${end} de ${total} pedidos</p>
        <div class="flex gap-2">
          <button onclick="changePage(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''} class="p-2 glass rounded-lg hover:bg-white/10 disabled:opacity-20 disabled:cursor-not-allowed">
            <span class="material-symbols-outlined text-sm">chevron_left</span>
          </button>
          <p class="flex items-center px-3 text-white font-bold">${currentPage}</p>
          <button onclick="changePage(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''} class="p-2 glass rounded-lg hover:bg-white/10 disabled:opacity-20 disabled:cursor-not-allowed">
            <span class="material-symbols-outlined text-sm">chevron_right</span>
          </button>
        </div>
      `;
    }

    function changePage(p) { currentPage = p; renderTable(); }
    function filterTable(f) { currentFilter = f; currentPage = 1; renderTable(); }
    function searchByClient(q) { searchQuery = q; currentPage = 1; renderTable(); }

    async function verPedido(id) {
      const p = allPedidos.find(x => x.id == id);
      if(!p) return;

      const steps = [
        { label: 'Pedido recibido', active: true },
        { label: 'Registrado en Shalom', active: ['ENVIADO', 'EN_TRANSITO', 'EN_DESTINO', 'ENTREGADO'].includes(p.estado) },
        { label: 'En tránsito', active: ['EN_TRANSITO', 'EN_DESTINO', 'ENTREGADO'].includes(p.estado) },
        { label: 'En agencia destino', active: ['EN_DESTINO', 'ENTREGADO'].includes(p.estado) },
        { label: 'Recogido por cliente', active: p.estado === 'ENTREGADO' }
      ];

      const modal = document.getElementById('modal');
      const content = document.getElementById('modalContent');
      
      content.innerHTML = `
        <div class="space-y-6">
          <div class="flex justify-between items-center">
            <span class="px-3 py-1 rounded-full text-xs font-bold ${getStatusColor(p.estado)} uppercase">
              ${p.estado.replace(/_/g, ' ')}
            </span>
            <p class="text-gray-500 text-sm font-medium">#${p.n_orden || String(p.id).substring(0,8)}</p>
          </div>
          
          <div class="space-y-4 text-left">
            <h2 class="text-2xl font-bold text-white">${p.cliente_nombre}</h2>
            <div class="grid grid-cols-2 gap-y-4 gap-x-2 text-sm">
              <div><p class="text-gray-500 text-[10px] uppercase font-bold tracking-widest">DNI</p><p class="text-white">${p.cliente_dni || '-'}</p></div>
              <div><p class="text-gray-500 text-[10px] uppercase font-bold tracking-widest">Color</p><p class="text-white">${p.color || 'Único'}</p></div>
              <div class="col-span-2"><p class="text-gray-500 text-[10px] uppercase font-bold tracking-widest">Destino</p><p class="text-white">${p.agencia_destino || '-'}</p></div>
              <div><p class="text-gray-500 text-[10px] uppercase font-bold tracking-widest">Precio</p><p class="text-white">S/${p.precio_total ?? '-'}</p></div>
              <div><p class="text-gray-500 text-[10px] uppercase font-bold tracking-widest">Anticipo</p><p class="text-white">S/${p.anticipo ?? 0}</p></div>
              <div><p class="text-gray-500 text-[10px] uppercase font-bold tracking-widest">Envío Shalom</p><p class="text-orange-400">S/${p.costo_envio ?? '-'} <span class="text-[9px] text-gray-500">(lo paga el cliente)</span></p></div>
              <div><p class="text-gray-500 text-[10px] uppercase font-bold tracking-widest">A cobrar (Yape)</p><p class="text-green-400 font-bold">S/${p.saldo_cobrar ?? '-'}</p></div>
              <div class="col-span-2"><p class="text-gray-500 text-[10px] uppercase font-bold tracking-widest">Servicios adicionales</p><p class="text-white">Sin servicios adicionales</p></div>
            </div>
          </div>

          <div class="pt-8 space-y-6 relative border-l-2 border-white/10 ml-4">
            ${steps.map((s, i) => `
              <div class="flex items-center gap-4 -ml-[9px] ${s.active ? 'step-active' : 'step-inactive'}">
                <div class="w-4 h-4 rounded-full dot border-2 border-[#0b0e14]"></div>
                <p class="text-sm font-semibold">${s.label}</p>
              </div>
            `).join('')}
          </div>
        </div>
      `;
      modal.classList.remove('hidden');
    }

    function closeModal() { document.getElementById('modal').classList.add('hidden'); }

    // ========== ELIMINAR PEDIDO ==========
    async function deletePedido(id, nombre) {
      if (!confirm(`¿Eliminar pedido de ${nombre}?`)) return;
      try {
        const res = await fetch(`${API_URL}/pedido/${id}`, {
          method: 'DELETE',
          headers: { 'x-api-key': 'shalom-bot-2026-secreto' }
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        await loadData();
      } catch (err) { alert('Error: ' + err.message); }
    }

    // ========== NUEVO PEDIDO ==========
    let allProducts = [];
    let agenciaPorNombre = {};

    async function openNewOrder() {
      // Cargar productos del catalogo
      try {
        const res = await fetch(`${API_URL}/productos`);
        const data = await res.json();
        allProducts = data.productos || data;

        const select = document.getElementById('no_producto');
        select.innerHTML = '<option value="">Seleccionar producto...</option>' +
          allProducts.map(p => {
            const colorTxt = (p.color && p.color !== 'Único') ? ` (${p.color})` : '';
            const stockTxt = (p.stock != null) ? ` · stock ${p.stock}` : '';
            return `<option value="${p.handle}" data-price="${p.precio_unitario}">${p.grupo || p.nombre_corto}${colorTxt} - S/${p.precio_unitario}${stockTxt}</option>`;
          }).join('');
      } catch (e) { console.error(e); }

      // Cargar agencias de Shalom para el selector de destino
      try {
        const resA = await fetch(`${API_URL}/agencias`);
        const dataA = await resA.json();
        const agencias = dataA.agencias || [];
        agenciaPorNombre = {};
        const dl = document.getElementById('agenciasDatalist');
        dl.innerHTML = agencias.map(a => `<option value="${a.nombre}">`).join('');
        agencias.forEach(a => { agenciaPorNombre[a.nombre] = a.ter_id; });
      } catch (e) { console.error(e); }

      // Limpiar formulario
      document.getElementById('newOrderForm').reset();
      document.getElementById('no_anticipo').value = '10';
      document.getElementById('no_saldo').value = '';
      document.getElementById('no_agencia_id').value = '';
      document.getElementById('newOrderModal').classList.remove('hidden');
    }

    // Resuelve la agencia escrita -> ter_id exacto
    function onDestinoInput() {
      const val = document.getElementById('no_destino').value;
      const terId = agenciaPorNombre[val];
      document.getElementById('no_agencia_id').value = terId || '';
      const hint = document.getElementById('destinoHint');
      if (terId) {
        hint.textContent = '✓ Agencia válida';
        hint.className = 'text-[10px] text-green-400 font-bold';
      } else {
        hint.textContent = 'Elige la agencia exacta de la lista de Shalom.';
        hint.className = 'text-[10px] text-gray-500';
      }
      validateForm();
    }

    function closeNewOrder() { document.getElementById('newOrderModal').classList.add('hidden'); }

    function onProductChange() {
      const select = document.getElementById('no_producto');
      const opt = select.options[select.selectedIndex];
      const price = opt.dataset.price;
      if (price) {
        document.getElementById('no_precio').value = price;
        calcSaldo();
      }
    }

    function calcSaldo() {
      const precio = parseFloat(document.getElementById('no_precio').value) || 0;
      const anticipo = parseFloat(document.getElementById('no_anticipo').value) || 0;
      document.getElementById('no_saldo').value = (precio - anticipo).toFixed(2);
    }

    function validateForm() {
      const nombre = document.getElementById('no_nombre').value.trim();
      const dni = document.getElementById('no_dni').value.trim();
      const tel = document.getElementById('no_telefono').value.trim();
      const dest = document.getElementById('no_agencia_id').value;  // ter_id de agencia válida
      const prod = document.getElementById('no_producto').value;
      const btn = document.getElementById('btnSubmitOrder');

      const isValid = nombre && dni && tel && dest && prod;
      btn.disabled = !isValid;
    }

    async function submitNewOrder(e) {
      e.preventDefault();
      const btn = document.getElementById('btnSubmitOrder');
      btn.disabled = true;
      btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> Guardando...';

      const body = {
        cliente_nombre: document.getElementById('no_nombre').value,
        cliente_dni: document.getElementById('no_dni').value,
        cliente_telefono: document.getElementById('no_telefono').value,
        producto_handle: document.getElementById('no_producto').value,
        anticipo: parseFloat(document.getElementById('no_anticipo').value) || 0,
        origen: document.getElementById('no_origen').value,
        agencia_destino: document.getElementById('no_destino').value,
        agencia_id: document.getElementById('no_agencia_id').value
      };

      try {
        const res = await fetch(`${API_URL}/pedido`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-api-key': 'shalom-bot-2026-secreto' },
          body: JSON.stringify(body)
        });
        const data = await res.json();

        if (data.error) throw new Error(data.error);

        closeNewOrder();
        await loadData();
        alert(data.message || 'Pedido registrado correctamente');
      } catch (err) {
        alert('Error: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<span class="material-symbols-outlined">local_shipping</span> Registrar y Enviar por Shalom';
      }
    }

    // ========== SYNC ==========
    async function syncData() {
      const btn = document.querySelector('button[onclick="syncData()"]');
      const origHTML = btn.innerHTML;
      btn.innerHTML = '<span class="material-symbols-outlined text-lg animate-spin">sync</span> Sincronizando...';
      btn.disabled = true;
      
      try {
        const res = await fetch(`${API_URL}/sync`, { method: 'POST' });
        const data = await res.json();
        
        if (data.error) throw new Error(data.error);
        
        await loadData();
        
        const msg = data.updated > 0 
          ? `${data.updated} pedido(s) actualizados de ${data.total} verificados`
          : `${data.total} pedidos verificados. Sin cambios.`;
        alert(msg);
      } catch (err) {
        alert('Error al sincronizar: ' + err.message);
      } finally {
        btn.innerHTML = origHTML;
        btn.disabled = false;
      }
    }

    loadData();
  </script>
</body>
</html>
